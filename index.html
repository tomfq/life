<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人 生 · 周 迹</title>

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    transition:0.3s;
}

/* ===== 主题 ===== */
body.dark{
    background:#0f0f10;
    color:#aaa;
}

body.light{
    background:#f5f5f5;
    color:#333;
}

h1{
    margin:14px 0 6px;
    font-weight:normal;
    letter-spacing:2px;
}

.topbar{
    font-size:12px;
    margin-bottom:10px;
}

button{
    font-size:12px;
    padding:4px 8px;
    cursor:pointer;
}

.wrap{
    width:100%;
    overflow:auto;
}

table{
    border-collapse:collapse;
    margin:auto;
}

/* ===== 网格 ===== */
td.cell{
    width:10px;
    height:10px;
    border:1px solid rgba(100,100,100,0.2);
    cursor:pointer;
}

body.dark td.cell{ background:#151515; }
body.light td.cell{ background:#eaeaea; }

td.on{
    background:#ffffff !important;
}

/* 年标 */
td.y{
    width:26px;
    font-size:10px;
    border:none;
    background:transparent !important;
    text-align:right;
    padding-right:4px;
}

/* 周标 */
td.x{
    height:16px;
    font-size:10px;
    border:none;
    background:transparent !important;
}
</style>
</head>

<body>

<h1>人 生 · 周 迹</h1>

<div class="topbar">
    <button onclick="toggleTheme()">切换主题</button>
</div>

<div class="wrap">
<table id="grid"></table>
</div>

<script>
(function(){

var rows = 100, cols = 52;
var table = document.getElementById("grid");

/* ===== 主题 ===== */
var theme = localStorage.getItem("theme");
if(!theme){
    theme = window.matchMedia &&
    window.matchMedia('(prefers-color-scheme: light)').matches
    ? "light" : "dark";
}
document.body.className = theme;

window.toggleTheme = function(){
    theme = (theme === "dark") ? "light" : "dark";
    document.body.className = theme;
    localStorage.setItem("theme", theme);
};

/* ===== 数据 ===== */
var store = {};
try{
    store = JSON.parse(localStorage.getItem("life_grid") || "{}");
}catch(e){}

function save(){
    localStorage.setItem("life_grid", JSON.stringify(store));
}

/* ===== 状态判断 ===== */
function isOn(r,c){
    var k = r+"-"+c;
    return store[k] === 1 || r < 22;
}

/* ===== 构建 ===== */
for(var r=-1; r<rows; r++){

    var tr = document.createElement("tr");

    /* 年标 */
    var y = document.createElement("td");
    y.className = "y";
    if(r>=0 && (r+1)%5===0) y.innerHTML = r+1;
    tr.appendChild(y);

    for(var c=0; c<cols; c++){

        var td = document.createElement("td");

        /* 周标 */
        if(r === -1){
            td.className = "x";
            if((c+1)%10===0) td.innerHTML = c+1;
            tr.appendChild(td);
            continue;
        }

        td.className = "cell";

        var key = r+"-"+c;

        if(isOn(r,c)){
            td.className = "cell on";
        }

        /* 点击 */
        td.onclick = (function(td,r,c){
            return function(){
                var k = r+"-"+c;
                store[k] = store[k] === 1 ? 0 : 1;
                td.className =
                    store[k] === 1 ? "cell on" : "cell";
                save();
            };
        })(td,r,c);

        tr.appendChild(td);
    }

    table.appendChild(tr);
}

})();
</script>
<br>
<br>
<br>

</body>
</html>
